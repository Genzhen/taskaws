name: Deploy to AWS

# -----------------------------------------------------------------------------
# Pipeline overview
# -----------------------------------------------------------------------------
#  test                 — type-check + build everything (incl. Lambda bundle)
#   └─ deploy-lambda    — sam deploy --resolve-s3 (no manual S3/Lambda/IAM)
#       └─ deploy-frontend — build web with VITE_SERVER_URL → S3 + CloudFront
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY        — deploy credentials
#   AWS_REGION                                      — (optional) default us-east-1
#   VPC_ID, SUBNET_A, SUBNET_B                      — existing VPC private Lambda subnets
#   DATABASE_WRITER_URL, DATABASE_READER_URL        — RDS PostgreSQL connection strings
#   BETTER_AUTH_SECRET                              — auth signing secret (>=32 chars)
#   FRONTEND_URL                                    — production frontend origin
#                                                     (used as CORS_ORIGIN and,
#                                                      temporarily, as BETTER_AUTH_URL)
#   AWS_S3_BUCKET                                   — frontend static hosting
#   AWS_CLOUDFRONT_DISTRIBUTION_ID                  — (optional) cache invalidation
#
# NOT required (removed):
#   AWS_LAMBDA_ROLE_ARN       — SAM auto-creates the execution role
#   AWS_S3_BUCKET_LAMBDA_CODE — `sam deploy --resolve-s3` auto-provisions the code bucket
# -----------------------------------------------------------------------------

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}

jobs:
  # ---------------------------------------------------------------------------
  # test — type-check + build, validates everything before any AWS calls
  # ---------------------------------------------------------------------------
  test:
    name: Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22.13.0
          package-manager-cache: false

      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.6.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (all packages including web)
        run: |
          pnpm check-types
          cd apps/web && (pnpm typecheck || pnpm check-types || exit 1)

      - name: Build
        env:
          VITE_SERVER_URL: http://localhost:3000
        run: pnpm build

      - name: Build Lambda bundle
        run: pnpm build:api

  # ---------------------------------------------------------------------------
  # deploy-lambda — SAM deploy. No manual S3 upload / role wiring / Function URL
  # creation — SAM + CloudFormation handle all of it from template.yaml.
  # ---------------------------------------------------------------------------
  deploy-lambda:
    name: Deploy Lambda via SAM
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22.13.0
          package-manager-cache: false

      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.6.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Lambda bundle
        run: pnpm build:api

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v3
        with:
          use-installer: true

      - name: Validate deployment secrets
        env:
          VPC_ID: ${{ secrets.VPC_ID }}
          SUBNET_A: ${{ secrets.SUBNET_A }}
          SUBNET_B: ${{ secrets.SUBNET_B }}
          DATABASE_WRITER_URL: ${{ secrets.DATABASE_WRITER_URL }}
          DATABASE_READER_URL: ${{ secrets.DATABASE_READER_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        run: |
          set -euo pipefail

          require_match() {
            local name="$1"
            local value="$2"
            local pattern="$3"
            local hint="$4"

            if [[ ! "$value" =~ $pattern ]]; then
              echo "::error::$name is invalid. $hint"
              exit 1
            fi
          }

          require_match "VPC_ID" "$VPC_ID" '^vpc-[0-9a-f]+$' "Use the real AWS VPC ID, for example vpc-0123456789abcdef0."
          require_match "SUBNET_A" "$SUBNET_A" '^subnet-[0-9a-f]+$' "Use the real private subnet ID, not a friendly name."
          require_match "SUBNET_B" "$SUBNET_B" '^subnet-[0-9a-f]+$' "Use the real private subnet ID, not a friendly name."
          require_match "DATABASE_WRITER_URL" "$DATABASE_WRITER_URL" '^postgres(ql)?://' "Use a PostgreSQL connection string."
          require_match "DATABASE_READER_URL" "$DATABASE_READER_URL" '^postgres(ql)?://' "Use a PostgreSQL connection string."
          require_match "FRONTEND_URL" "$FRONTEND_URL" '^https?://' "Use the deployed frontend origin, for example https://example.com."

          if [[ ${#BETTER_AUTH_SECRET} -lt 32 ]]; then
            echo "::error::BETTER_AUTH_SECRET must be at least 32 characters."
            exit 1
          fi

      # -------------------------------------------------------------------------
      # First SAM deploy.
      # BETTER_AUTH_URL is set to FRONTEND_URL as a temporary placeholder —
      # better-auth needs a real URL, but the Lambda URL isn't known until the
      # Function URL is created. We fix it in the second deploy below.
      # -------------------------------------------------------------------------
      - name: SAM deploy (create / update stack)
        run: |
          sam deploy \
            --no-confirm-changeset \
            --resolve-s3 \
            --stack-name taskaws \
            --region "${{ env.AWS_REGION }}" \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              VpcId="${{ secrets.VPC_ID }}" \
              SubnetA="${{ secrets.SUBNET_A }}" \
              SubnetB="${{ secrets.SUBNET_B }}" \
              DatabaseWriterUrl="${{ secrets.DATABASE_WRITER_URL }}" \
              DatabaseReaderUrl="${{ secrets.DATABASE_READER_URL }}" \
              BetterAuthSecret="${{ secrets.BETTER_AUTH_SECRET }}" \
              BetterAuthUrl="${{ secrets.FRONTEND_URL }}" \
              CorsOrigin="${{ secrets.FRONTEND_URL }}"

      # -------------------------------------------------------------------------
      # Read the Lambda Function URL from the stack outputs.
      # -------------------------------------------------------------------------
      - name: Get Lambda Function URL
        id: get-url
        run: |
          LAMBDA_URL=$(aws cloudformation describe-stacks \
            --stack-name taskaws \
            --query "Stacks[0].Outputs[?OutputKey=='LambdaFunctionUrl'].OutputValue" \
            --output text)
          if [ -z "$LAMBDA_URL" ] || [ "$LAMBDA_URL" = "None" ]; then
            echo "::error::LambdaFunctionUrl output not found on stack 'taskaws'"
            exit 1
          fi
          LAMBDA_URL="${LAMBDA_URL%/}"
          echo "Lambda URL: $LAMBDA_URL"
          echo "lambda_url=$LAMBDA_URL" >> "$GITHUB_OUTPUT"

      # -------------------------------------------------------------------------
      # Second SAM deploy — config-only, no code change.
      # Updates BETTER_AUTH_URL to the actual Lambda Function URL so better-auth
      # signs cookies against the right domain.
      # -------------------------------------------------------------------------
      - name: SAM deploy (pin BETTER_AUTH_URL to Lambda URL)
        run: |
          sam deploy \
            --no-confirm-changeset \
            --resolve-s3 \
            --stack-name taskaws \
            --region "${{ env.AWS_REGION }}" \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              VpcId="${{ secrets.VPC_ID }}" \
              SubnetA="${{ secrets.SUBNET_A }}" \
              SubnetB="${{ secrets.SUBNET_B }}" \
              DatabaseWriterUrl="${{ secrets.DATABASE_WRITER_URL }}" \
              DatabaseReaderUrl="${{ secrets.DATABASE_READER_URL }}" \
              BetterAuthSecret="${{ secrets.BETTER_AUTH_SECRET }}" \
              BetterAuthUrl="${{ steps.get-url.outputs.lambda_url }}" \
              CorsOrigin="${{ secrets.FRONTEND_URL }}"

  # ---------------------------------------------------------------------------
  # deploy-frontend — build web with VITE_SERVER_URL → S3 + CloudFront
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend to S3
    needs: deploy-lambda
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22.13.0
          package-manager-cache: false

      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.6.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set Lambda URL env
        run: |
          LAMBDA_URL=$(aws cloudformation describe-stacks \
            --stack-name taskaws \
            --query "Stacks[0].Outputs[?OutputKey=='LambdaFunctionUrl'].OutputValue" \
            --output text)
          if [ -z "$LAMBDA_URL" ] || [ "$LAMBDA_URL" = "None" ]; then
            echo "::error::LambdaFunctionUrl output not found on stack 'taskaws'"
            exit 1
          fi
          LAMBDA_URL="${LAMBDA_URL%/}"
          echo "VITE_SERVER_URL=$LAMBDA_URL" >> "$GITHUB_ENV"
          echo "VITE_SERVER_URL=$LAMBDA_URL" >> apps/web/.env

      - name: Build frontend
        run: pnpm -F web build

      - name: Sync to S3 with SPA fallback
        run: |
          aws s3 sync apps/web/build/client s3://${{ secrets.AWS_S3_BUCKET }} --delete
          aws s3 cp apps/web/build/client/index.html s3://${{ secrets.AWS_S3_BUCKET }}/index.html

      - name: Allow public reads for S3 website
        run: |
          aws s3api put-public-access-block \
            --bucket ${{ secrets.AWS_S3_BUCKET }} \
            --public-access-block-configuration \
              BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false

          aws s3api put-bucket-policy \
            --bucket ${{ secrets.AWS_S3_BUCKET }} \
            --policy '{
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "PublicReadForStaticWebsite",
                  "Effect": "Allow",
                  "Principal": "*",
                  "Action": "s3:GetObject",
                  "Resource": "arn:aws:s3:::${{ secrets.AWS_S3_BUCKET }}/*"
                }
              ]
            }'

      - name: Configure S3 for SPA routing
        run: |
          aws s3api put-bucket-website \
            --bucket ${{ secrets.AWS_S3_BUCKET }} \
            --website-configuration '{"IndexDocument":{"Suffix":"index.html"},"ErrorDocument":{"Key":"index.html"}}'

      - name: Invalidate CloudFront cache
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          if [ -n "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
              --paths "/*"
          fi
