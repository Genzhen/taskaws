name: Deploy to AWS

# -----------------------------------------------------------------------------
# Pipeline overview
# -----------------------------------------------------------------------------
#  test                 — type-check + build everything (incl. Lambda bundle)
#   └─ deploy-lambda    — sam deploy --resolve-s3 (no manual S3/Lambda/IAM)
#       └─ deploy-frontend — build web with VITE_SERVER_URL → S3 + CloudFront
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY        — deploy credentials
#   AWS_REGION                                      — (optional) default us-east-1
#   BETTER_AUTH_SECRET                              — auth signing secret (>=32 chars)
#   FRONTEND_URL                                    — production frontend origin
#                                                     (used as CORS_ORIGIN and,
#                                                      temporarily, as BETTER_AUTH_URL)
#   AWS_S3_BUCKET                                   — frontend static hosting
#   AWS_CLOUDFRONT_DISTRIBUTION_ID                  — (optional) cache invalidation
#
# NOT required (removed):
#   DATABASE_URL              — DB URLs are hardcoded in template.yaml
#   AWS_LAMBDA_ROLE_ARN       — SAM auto-creates the execution role
#   AWS_S3_BUCKET_LAMBDA_CODE — `sam deploy --resolve-s3` auto-provisions the code bucket
# -----------------------------------------------------------------------------

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}

jobs:
  # ---------------------------------------------------------------------------
  # test — type-check + build, validates everything before any AWS calls
  # ---------------------------------------------------------------------------
  test:
    name: Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (all packages including web)
        run: |
          pnpm check-types
          cd apps/web && (pnpm typecheck || pnpm check-types || exit 1)

      - name: Build
        run: pnpm build

      - name: Build Lambda bundle
        run: pnpm build:api

  # ---------------------------------------------------------------------------
  # deploy-lambda — SAM deploy. No manual S3 upload / role wiring / Function URL
  # creation — SAM + CloudFormation handle all of it from template.yaml.
  # ---------------------------------------------------------------------------
  deploy-lambda:
    name: Deploy Lambda via SAM
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      lambda_url: ${{ steps.get-url.outputs.lambda_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Lambda bundle
        run: pnpm build:api

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      # -------------------------------------------------------------------------
      # Migrations.
      # drizzle-kit reads DATABASE_WRITER_URL from the env
      # (see packages/db/drizzle.config.ts). The canonical DB URL lives hardcoded
      # in template.yaml; we extract it here so CI can run migrations without
      # an extra Secret.
      # -------------------------------------------------------------------------
      - name: Extract DATABASE_WRITER_URL from template.yaml for migrations
        run: |
          set -euo pipefail
          DB_URL=$(grep -E '^\s+DATABASE_WRITER_URL:' template.yaml \
                   | head -1 \
                   | sed -E 's/.*DATABASE_WRITER_URL:\s*"([^"]+)".*/\1/')
          if [ -z "$DB_URL" ]; then
            echo "::error::Failed to extract DATABASE_WRITER_URL from template.yaml"
            exit 1
          fi
          echo "::add-mask::$DB_URL"
          echo "DATABASE_WRITER_URL=$DB_URL" >> "$GITHUB_ENV"

      - name: Run database migrations
        run: pnpm db:migrate

      # -------------------------------------------------------------------------
      # First SAM deploy.
      # BETTER_AUTH_URL is set to FRONTEND_URL as a temporary placeholder —
      # better-auth needs a real URL, but the Lambda URL isn't known until the
      # Function URL is created. We fix it in the second deploy below.
      # -------------------------------------------------------------------------
      - name: SAM deploy (create / update stack)
        run: |
          sam deploy \
            --no-confirm-changeset \
            --resolve-s3 \
            --stack-name taskaws \
            --region "${{ env.AWS_REGION }}" \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              BetterAuthSecret="${{ secrets.BETTER_AUTH_SECRET }}" \
              BetterAuthUrl="${{ secrets.FRONTEND_URL }}" \
              CorsOrigin="${{ secrets.FRONTEND_URL }}"

      # -------------------------------------------------------------------------
      # Read the Lambda Function URL from the stack outputs.
      # -------------------------------------------------------------------------
      - name: Get Lambda Function URL
        id: get-url
        run: |
          LAMBDA_URL=$(aws cloudformation describe-stacks \
            --stack-name taskaws \
            --query "Stacks[0].Outputs[?OutputKey=='LambdaFunctionUrl'].OutputValue" \
            --output text)
          if [ -z "$LAMBDA_URL" ] || [ "$LAMBDA_URL" = "None" ]; then
            echo "::error::LambdaFunctionUrl output not found on stack 'taskaws'"
            exit 1
          fi
          LAMBDA_URL="${LAMBDA_URL%/}"
          echo "Lambda URL: $LAMBDA_URL"
          echo "lambda_url=$LAMBDA_URL" >> "$GITHUB_OUTPUT"

      # -------------------------------------------------------------------------
      # Second SAM deploy — config-only, no code change.
      # Updates BETTER_AUTH_URL to the actual Lambda Function URL so better-auth
      # signs cookies against the right domain.
      # -------------------------------------------------------------------------
      - name: SAM deploy (pin BETTER_AUTH_URL to Lambda URL)
        run: |
          sam deploy \
            --no-confirm-changeset \
            --resolve-s3 \
            --stack-name taskaws \
            --region "${{ env.AWS_REGION }}" \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              BetterAuthSecret="${{ secrets.BETTER_AUTH_SECRET }}" \
              BetterAuthUrl="${{ steps.get-url.outputs.lambda_url }}" \
              CorsOrigin="${{ secrets.FRONTEND_URL }}"

  # ---------------------------------------------------------------------------
  # deploy-frontend — build web with VITE_SERVER_URL → S3 + CloudFront
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend to S3
    needs: deploy-lambda
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set Lambda URL env
        run: |
          echo "VITE_SERVER_URL=${{ needs.deploy-lambda.outputs.lambda_url }}" >> apps/web/.env

      - name: Build frontend
        run: pnpm -F web build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3 with SPA fallback
        run: |
          aws s3 sync apps/web/build/client s3://${{ secrets.AWS_S3_BUCKET }} --delete
          aws s3 cp apps/web/build/client/index.html s3://${{ secrets.AWS_S3_BUCKET }}/index.html

      - name: Configure S3 for SPA routing
        run: |
          aws s3api put-bucket-website \
            --bucket ${{ secrets.AWS_S3_BUCKET }} \
            --website-configuration '{"IndexDocument":{"Suffix":"index.html"},"ErrorDocument":{"Key":"index.html"}}'

      - name: Invalidate CloudFront cache
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          if [ -n "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
              --paths "/*"
          fi
