AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: TaskAWS Serverless API (Hono + tRPC + better-auth on Lambda Function URL)

# =============================================================================
# Global defaults applied to every Lambda function in this stack.
# =============================================================================
Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: nodejs20.x
    Architectures:
      - x86_64

# =============================================================================
# Parameters passed via `sam deploy --parameter-overrides`.
# =============================================================================
Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Existing VPC ID that contains the private Lambda/RDS subnets
  SubnetA:
    Type: AWS::EC2::Subnet::Id
    Description: Private subnet ID for Lambda ENIs
  SubnetB:
    Type: AWS::EC2::Subnet::Id
    Description: Private subnet ID for Lambda ENIs
  DatabaseWriterUrl:
    Type: String
    NoEcho: true
    Description: PostgreSQL writer connection string
  DatabaseReaderUrl:
    Type: String
    NoEcho: true
    Description: PostgreSQL reader connection string
  BetterAuthSecret:
    Type: String
    NoEcho: true
    Description: Better-Auth secret (>= 32 chars, generated via `openssl rand -base64 32`)
    MinLength: 32
  BetterAuthUrl:
    Type: String
    Description: Base URL of the auth server (the Lambda Function URL — set after first deploy)
    Default: ""
  CorsOrigin:
    Type: String
    Description: Allowed frontend origin for CORS and better-auth trustedOrigins (e.g. https://app.example.com)
    Default: ""

# =============================================================================
# Resources
# =============================================================================
Resources:
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow taskaws Lambda to connect to VPC resources
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 0.0.0.0/0
          Description: PostgreSQL egress to the existing RDS security group

  TaskAwsApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: taskaws-api
      Description: TaskAWS API (Hono + tRPC + better-auth)
      Handler: lambda.handler
      CodeUri: apps/server/dist/lambda.zip

      # -----------------------------------------------------------------------
      # Execution role.
      # SAM auto-creates a role and attaches the listed managed policies.
      # No need to manually specify or maintain an IAM Role ARN.
      #   - AWSLambdaBasicExecutionRole    → CloudWatch Logs write
      #   - AWSLambdaVPCAccessExecutionRole → ENI management for VPC access
      #                                       (RDS / ElastiCache / etc.)
      # -----------------------------------------------------------------------
      Policies:
        - AWSLambdaBasicExecutionRole
        - AWSLambdaVPCAccessExecutionRole

      # -----------------------------------------------------------------------
      # Environment variables.
      # DB/auth values are injected from GitHub Secrets via SAM parameters.
      # -----------------------------------------------------------------------
      Environment:
        Variables:
          DATABASE_WRITER_URL: !Ref DatabaseWriterUrl
          DATABASE_READER_URL: !Ref DatabaseReaderUrl
          BETTER_AUTH_SECRET: !Ref BetterAuthSecret
          BETTER_AUTH_URL: !Ref BetterAuthUrl
          CORS_ORIGIN: !Ref CorsOrigin

      VpcConfig:
        SubnetIds:
          - !Ref SubnetA
          - !Ref SubnetB
        SecurityGroupIds:
          - !GetAtt LambdaSecurityGroup.GroupId

      # -----------------------------------------------------------------------
      # Lambda Function URL — public, no Lambda-level auth (auth handled in-app
      # via better-auth). CORS locked to the frontend origin.
      # -----------------------------------------------------------------------
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - !Ref CorsOrigin
          AllowHeaders:
            - Content-Type
            - Authorization
            - Cookie
          AllowMethods:
            - GET
            - POST
          AllowCredentials: true

# =============================================================================
# Outputs — consumed by the GitHub Actions workflow (deploy-lambda job reads
# LambdaFunctionUrl to wire VITE_SERVER_URL into the frontend build).
# =============================================================================
Outputs:
  LambdaFunctionUrl:
    Description: Lambda Function URL (public API endpoint)
    Value: !GetAtt TaskAwsApiFunctionUrl.FunctionUrl
    Export:
      Name: TaskAwsApiUrl
  FunctionName:
    Description: Lambda function name
    Value: !Ref TaskAwsApiFunction
