services:
  postgres:
    image: postgres:15-alpine
    container_name: taskaws-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      default:
        aliases:
          - postgres

  intro-go:
    build:
      context: ./apps/intro-go
    container_name: taskaws-intro-go
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_READER_URL: postgresql://postgres:password@postgres:5432/postgres
      DB_SSLMODE: disable
      CORS_ORIGIN: http://localhost:5173
      PORT: "8080"
    ports:
      - "8080:8080"
    networks:
      - default

volumes:
  postgres_data:

networks:
  default:
    driver: bridge
